<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Occ Calendar</title><link rel="stylesheet" href="/public/style.css"></head><body>
<div class="wrap"><div class="panel"><div class="panel-h">Occupancy Calendar</div><div class="panel-b"><div class="filters"><label>Month<input id="month" type="month"></label><button class="btn" onclick="load()">Load</button></div><h2 id="label"></h2><div class="calendar" id="cal"></div></div></div></div>
<script src="/public/app.js"></script><script>
active("occ"); q("month").value=today().slice(0,7);
async function load(){const d=await api("/api/occ-calendar?month="+q("month").value);q("label").textContent="Occupancy Calendar - "+d.month_label;let first=new Date(d.month+"-01").getDay();let html=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(x=>`<div class="wd">${x}</div>`).join("");for(let i=0;i<first;i++)html+=`<div class="day"></div>`;d.days.forEach(x=>html+=`<div class="day ${x.date===today()?'todaycell':''}"><div class="head"><span>${x.day}</span><span>${x.occupancy}%</span></div><div>Rooms <b style="float:right">${x.rooms}</b></div><div>REV <b style="float:right">${money(x.revenue)}</b></div><div>AVR <b style="float:right">${money(x.avr)}</b></div><div>RevPAR <b style="float:right">${money(x.revpar)}</b></div></div>`);html+=`<div class="sum"><h3>Summary</h3><div class="sumrow"><span>Occupancy</span><b>${d.summary.occupancy}%</b></div><div class="sumrow"><span>Room Night</span><b>${d.summary.room_nights}</b></div><div class="sumrow"><span>Revenue</span><b>${money(d.summary.revenue)}</b></div><div class="sumrow"><span>AVR</span><b>${money(d.summary.avr)}</b></div><div class="sumrow"><span>RevPAR</span><b>${money(d.summary.revpar)}</b></div></div>`;q("cal").innerHTML=html}load();
</script></body></html>
