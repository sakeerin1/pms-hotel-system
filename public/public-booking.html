<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Direct Booking</title><link rel="stylesheet" href="/public/style.css"><style>.legacy-shell{display:none}.wrap{max-width:920px;margin:auto}</style></head><body>
<div class="wrap"><div class="panel"><div class="panel-h">จองห้องพักโดยตรง / LINE Direct Booking</div><div class="panel-b">
<div class="formgrid"><label>Check-in<input id="checkin" type="date"></label><label>Check-out<input id="checkout" type="date"></label><label>ประเภทห้อง<select id="roomType"></select></label><label>Promo Code<input id="promo" placeholder="ถ้ามี"></label><label>ชื่อผู้เข้าพัก<input id="guest"></label><label>เบอร์โทร<input id="phone"></label><label>จำนวนผู้เข้าพัก<input id="guests" type="number" value="2"></label><label>ยอดมัดจำ<input id="paid" type="number" value="0"></label></div>
<label style="margin-top:8px">หมายเหตุ<textarea id="note" rows="3" placeholder="เช่น ขอเตียงคู่ / เช็คอินดึก"></textarea></label><label style="margin-top:8px">แนบสลิปมัดจำ<input id="slip" type="file" accept="image/*"></label>
<div class="actions" style="margin-top:8px"><button class="btn" onclick="check()">เช็คราคา/ห้องว่าง</button><button class="btn" onclick="save()">ส่งคำขอจอง</button></div><div id="quote" style="margin-top:8px"></div><div id="result" style="margin-top:8px"></div>
</div></div></div>
<script src="/public/app.js"></script><script>
active("publicbooking");q("checkin").value=today();q("checkout").value=addDays(today(),1);let types=[];
async function init(){const av=await api(`/api/public/availability?checkin=${q("checkin").value}&checkout=${q("checkout").value}`);types=av;q("roomType").innerHTML=av.map(x=>`<option value="${x.id}">${x.code} - ${x.name} / ว่าง ${x.available}</option>`).join("");check();}
q("checkin").onchange=init;q("checkout").onchange=init;q("roomType").onchange=check;q("promo").onchange=check;
async function check(){const id=q("roomType").value;if(!id)return;const av=await api(`/api/public/availability?checkin=${q("checkin").value}&checkout=${q("checkout").value}`);const a=av.find(x=>String(x.id)===String(id));const qt=await api(`/api/public/quote?room_type_id=${id}&checkin=${q("checkin").value}&checkout=${q("checkout").value}&promo_code=${encodeURIComponent(q("promo").value)}`);q("quote").innerHTML=`<div class="card"><b>${qt.room_type.name}</b><br>จำนวนคืน: ${qt.nights}<br>ห้องว่างสำหรับขาย: <b>${a?a.available:0}</b><br>ราคาก่อนส่วนลด: ${money(qt.gross_total)}<br>ส่วนลด: ${money(qt.discount_amount)}<br>ยอดสุทธิ: <b>${money(qt.final_total)}</b>${qt.promo_reason?`<br><span class="muted">Promo: ${qt.promo_reason}</span>`:""}</div>`;}
async function save(){const slip=await fileToBase64(q("slip").files[0]);const payload={room_type_id:Number(q("roomType").value),checkin:q("checkin").value,checkout:q("checkout").value,guest_name:q("guest").value,phone:q("phone").value,guests:Number(q("guests").value),promo_code:q("promo").value,paid_amount:Number(q("paid").value),slip_base64:slip,note:q("note").value};try{const b=await api("/api/public/bookings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});q("result").innerHTML=`<div class="card"><b>ส่งคำขอจองสำเร็จ</b><br>เลขจอง: ${b.booking_no}<br>สถานะ: รอพนักงานยืนยัน<br>ยอดสุทธิ: ${money(b.total_amount)}</div>`;}catch(e){alert(e.message)}}
init();
</script></body></html>
